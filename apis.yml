aid: james-webb-space-telescope-api
name: James Webb Space Telescope API
description: >-
  A free, third-party API for accessing James Webb Space Telescope data
  sourced from the Mikulski Archive for Space Telescopes (MAST). The API
  provides access to JWST images, observations, and data filterable by
  program, type, and other parameters. It is built by an independent
  engineer (not an official NASA, ESA, or CSA service) and data is
  available under CC-BY 4.0. Authentication is via API key obtained at
  signup.
